<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ PhotoBooth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  /* Opacity slider row */
  .opacity-row {
    display: none;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(255,105,180,0.06);
    border-radius: 50px;
    border: 1px solid var(--border);
  }
  .opacity-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-secondary);
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .opacity-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    outline: none;
    cursor: pointer;
  }
  .opacity-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 2px 8px rgba(255,105,180,0.4);
    cursor: pointer;
    border: 2px solid #fff;
    transition: transform 0.15s;
  }
  .opacity-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
  .opacity-value {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--primary);
    min-width: 40px;
    text-align: right;
  }
  .filter-grid { grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); }
</style>
</head>
<body>
  <div class="app-bg"></div>
  <div class="container">

    <header class="header">
      <h1 class="logo">✨ PhotoBooth</h1>
    </header>

    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-label">Next in</span>
        <span class="stat-value" id="timerDisplay">7</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Photos</span>
        <span class="stat-value"><span id="photoCountDisplay">0</span><span class="stat-max">/10</span></span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Selected</span>
        <span class="stat-value" id="selectedCountStat">0/4</span>
      </div>
    </div>

    <div class="booth-wrapper">
      <div class="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="countdown-display" id="countdownDisplay"></div>
        <div class="flash" id="flash"></div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="camera-hint" id="cameraHint">Press <b>Start Session</b> to begin</div>
      </div>
    </div>

    <div class="controls-section">
      <div class="section-title">Filters</div>

      <div class="filter-grid">
        <button class="filter-btn active" data-filter="none">Normal</button>
        <button class="filter-btn" data-filter="bw">B&amp;W</button>
        <button class="filter-btn" data-filter="sepia">Sepia</button>
        <button class="filter-btn" data-filter="hicontrast">Hi-Con</button>
        <button class="filter-btn" data-filter="grain">Film Grain</button>
        <button class="filter-btn" data-filter="lightleak">Light Leak</button>
        <button class="filter-btn" data-filter="polaroid">Polaroid</button>
        <button class="filter-btn" data-filter="softglow">Soft Glow</button>
        <button class="filter-btn" data-filter="rosy">Rosy</button>
        <button class="filter-btn" data-filter="cold">Cold Blue</button>
        <button class="filter-btn" data-filter="warm">Warm</button>
      </div>

      <div class="opacity-row" id="opacityRow">
        <span class="opacity-label">Intensity</span>
        <input type="range" class="opacity-slider" id="opacitySlider" min="10" max="100" value="100">
        <span class="opacity-value" id="opacityValue">100%</span>
      </div>

      <div class="button-group" style="margin-top:18px">
        <button class="btn btn-primary" id="startButton">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Start Session
        </button>
        <button class="btn btn-secondary hidden" id="restartButton">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.13"/></svg>
          Retake
        </button>
      </div>
    </div>

    <div class="gallery-section">
      <div class="gallery-header">
        <div class="gallery-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Photo Gallery
        </div>
        <div class="header-controls">
          <div class="layout-options">
            <button class="layout-btn active" data-layout="2x2">⊞ Grid</button>
            <button class="layout-btn" data-layout="strip">▥ Strip</button>
            <button class="layout-btn" data-layout="film">🎞 Film</button>
          </div>
        </div>
      </div>

      <div class="selection-info">
        <span class="selection-text">Select exactly <span class="selection-count" id="selectedCount">0/4</span> photos</span>
        <span class="selection-message" id="selectionMessage"></span>
      </div>

      <div class="gallery-grid" id="photoGallery"></div>

      <div class="button-group" style="margin-top:24px">
        <button class="btn btn-download" id="downloadButton" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download Collage
        </button>
      </div>
    </div>

  </div>

  <canvas id="canvas" style="display:none"></canvas>

  <script src="script.js"></script>
</body>
</html>
